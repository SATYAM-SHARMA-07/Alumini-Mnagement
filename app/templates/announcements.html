{% extends 'base.html' %}
{% block content %}
<div class="row g-4">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body">
                <h5>Create Announcement</h5>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" name="title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Content</label>
                        <textarea name="content" class="form-control" rows="4" required></textarea>
                    </div>
                    <button class="btn btn-primary" type="submit">Post</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-7">
        <h5>Recent Announcements</h5>
        {% for a in announcements %}
            <div class="card mb-2">
                <div class="card-body">
                    <h6>{{ a.title }}</h6>
                    <p class="mb-1">{{ a.content }}</p>
                    <small class="text-muted">{{ a.created_at.strftime('%Y-%m-%d %H:%M') }}</small>
                </div>
            </div>
        {% else %}
            <p class="text-muted">No announcements posted yet.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
