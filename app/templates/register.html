{% extends 'base.html' %}
{% block content %}

<div class="auth-container d-flex justify-content-center align-items-center">

    <div class="auth-card">

        <!-- 🔷 TITLE -->
        <div class="text-center mb-4">
            <h2 class="fw-bold">Create Account 🚀</h2>
            <p class="text-muted">Join the Alumni Network</p>
        </div>

        <!-- 🔷 FORM -->
        <form method="post">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Min 6 characters" minlength="6" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Role</label>
                <select name="role" class="form-select">
                    <option value="student">🎓 Student</option>
                    <option value="alumni">👨‍🎓 Alumni</option>
                    <option value="admin">⚙️ Admin</option>
                </select>
            </div>

            <button type="submit" class="btn btn-success w-100 mt-2">
                Register
            </button>

            <div class="text-center mt-3">
                <a href="{{ url_for('auth.login') }}" class="text-decoration-none">
                    Already have an account? Login
                </a>
            </div>

        </form>

    </div>

</div>

{% endblock %}
