{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="mb-3">Alumni Profile</h4>
                {% if current_user.role != 'alumni' %}
                    <p class="text-danger">Only alumni can edit this profile.</p>
                {% endif %}
                <form method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Batch</label>
                            <input type="text" name="batch" class="form-control" value="{{ profile.batch if profile else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Branch</label>
                            <input type="text" name="branch" class="form-control" value="{{ profile.branch if profile else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Company</label>
                            <input type="text" name="company" class="form-control" value="{{ profile.company if profile else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Job Role</label>
                            <input type="text" name="job_role" class="form-control" value="{{ profile.job_role if profile else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Skills</label>
                            <input type="text" name="skills" class="form-control" value="{{ profile.skills if profile else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">LinkedIn</label>
                            <input type="url" name="linkedin" class="form-control" value="{{ profile.linkedin if profile else '' }}">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary mt-3" {% if current_user.role != 'alumni' %}disabled{% endif %}>Save Profile</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
