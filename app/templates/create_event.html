{% extends 'base.html' %}
{% block content %}

<!-- 🔷 HEADER -->
<div class="mb-4">
    <h3 class="fw-bold">Create Event ✨</h3>
    <p class="text-muted">Organize a new event for alumni</p>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">

        <div class="card p-4">

            <form method="post">

                <div class="row g-3">

                    <!-- Title -->
                    <div class="col-md-12">
                        <label class="form-label">Event Title</label>
                        <input type="text" name="title" class="form-control" placeholder="Enter event title" required>
                    </div>

                    <!-- Description -->
                    <div class="col-md-12">
                        <label class="form-label">Description</label>
                        <textarea name="description" rows="4" class="form-control"
                                  placeholder="Describe the event..." required></textarea>
                    </div>

                    <!-- Date -->
                    <div class="col-md-6">
                        <label class="form-label">Date & Time</label>
                        <input type="datetime-local" name="event_date" class="form-control" required>
                    </div>

                    <!-- Location -->
                    <div class="col-md-6">
                        <label class="form-label">Location</label>
                        <input type="text" name="location" class="form-control" placeholder="Enter location" required>
                    </div>

                </div>

                <!-- BUTTON -->
                <button class="btn btn-success w-100 mt-4" type="submit">
                    🚀 Create Event
                </button>

            </form>

        </div>

    </div>
</div>

{% endblock %}
